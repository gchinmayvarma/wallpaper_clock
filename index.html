<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chillax</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Audiowide&family=Oxanium&family=Electrolize&family=Iceland&family=Michroma&family=Exo+2&family=Nova+Mono&display=swap">
</head>

<body>
    <div id="controls">
        <input id="opacity-slider" type="range" min="10" max="100" title="Clock opacity">
        <button id="font-btn" title="Change font"></button>
    </div>
    <div id="clock">
        <span id="am_pm"></span>
        <span id="time_h"></span><span class="time_dh">:</span>
        <span id="time_m"></span>
        <span id="time_s"></span>
        <span id="timezone"></span>
        <div id="day-progress">
            <div id="day-progress-fill"></div>
            <span class="dp-tick dp-25"></span>
            <span class="dp-tick dp-50"></span>
            <span class="dp-tick dp-75"></span>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
</body>

</html>
